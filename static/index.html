<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Full Stack Assignment</p>
        <h1>Task Manager</h1>
        <p class="hero-copy">
          Create tasks, mark them complete, filter the list, and remove anything
          you no longer need.
        </p>
      </section>

      <section class="panel">
        <form id="task-form" class="task-form">
          <label class="sr-only" for="title">Task title</label>
          <input
            id="title"
            name="title"
            type="text"
            maxlength="120"
            placeholder="Add a task"
            required
          />
          <button type="submit">Add task</button>
        </form>

        <div class="toolbar">
          <div class="filters" role="group" aria-label="Filter tasks">
            <button type="button" class="filter-button active" data-filter="all">All</button>
            <button type="button" class="filter-button" data-filter="active">Active</button>
            <button type="button" class="filter-button" data-filter="completed">Completed</button>
          </div>
          <p id="summary" class="summary">Loading tasks...</p>
        </div>

        <p id="feedback" class="feedback" aria-live="polite"></p>
        <p id="error" class="error" aria-live="assertive"></p>

        <div id="loading" class="loading">Loading tasks...</div>
        <ul id="task-list" class="task-list"></ul>
        <template id="empty-state">
          <li class="empty-state">No tasks match this view yet.</li>
        </template>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
